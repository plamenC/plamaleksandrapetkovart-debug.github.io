<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>AR Poster</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MindAR (image tracking) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  a-scene {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
  }

  #fullscreenBtn {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 10000;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.35);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    cursor: pointer;
  }

  #fullscreenBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .mindar-ui-scanning .scanning {
    width: 85vw !important;
    height: 85vh !important;
  }

  /* @media (orientation: portrait) {
    .mindar-ui-scanning .scanning {
      width: 85vw !important;
      height: 85vw !important;
    }
  }

  @media (orientation: landscape) {
    .mindar-ui-scanning .scanning {
      width: 85vh !important;
      height: 85vh !important;
    }
  } */
</style>

<body>
  <button id="fullscreenBtn" type="button">Enter fullscreen</button>
  <div id="statusText"
    style="position: fixed; top: 12px; left: 12px; z-index: 9999; background: rgba(0,0,0,0.7); color: #fff; padding: 8px 10px; border-radius: 6px; font-family: Arial, sans-serif; white-space: pre-line;">
    waiting for targets
  </div>
  <!-- maximum 1 target at a time ! -->
  <a-scene mindar-image="imageTargetSrc: targets.mind; maxTrack: 1;" color-space="sRGB"

    device-orientation-permission-ui="enabled: false">

    </a-entity>

    </a-entity>

      <a-video src="#vid13" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target3" mindar-image-target="targetIndex: 3">
      <a-video src="#vid14" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target4" mindar-image-target="targetIndex: 4">

    <a-entity id="target17" mindar-image-target="targetIndex: 17">

    </a-entity>

    <a-entity id="target18" mindar-image-target="targetIndex: 18">

    </a-entity>

    <a-entity id="target19" mindar-image-target="targetIndex: 19">
      <a-video src="#vid120" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target20" mindar-image-target="targetIndex: 20">
      <a-video src="#vid121" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target21" mindar-image-target="targetIndex: 21">
      <a-video src="#vid122" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target22" mindar-image-target="targetIndex: 22">
      <a-video src="#vid123" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>
  </a-scene>

  <script>
    const TARGET_COUNT = 23;
    const statusText = document.getElementById("statusText");
    const scene = document.querySelector("a-scene");

    const videoIdForTarget = (index) =>
      index === 0 ? "vid1" : `vid1${index + 1}`;

    const targets = Array.from({ length: TARGET_COUNT }, (_, i) =>
      document.getElementById(`target${i}`)
    );

    const videos = targets.map((_, i) =>
      document.getElementById(videoIdForTarget(i))
    );

    const targetVisible = Array(TARGET_COUNT).fill(false);

    const loadVideo = (video) => {
      if (!video || video.dataset.loaded === "true") {
        return Promise.resolve();
      }
      if (video._loadPromise) return video._loadPromise;

      const src = video.dataset.src;
      if (!src) return Promise.resolve();

      video._loadPromise = new Promise((resolve, reject) => {
        video.addEventListener("loadeddata", () => {
          video.dataset.loaded = "true";
          resolve();
        }, { once: true });
        video.addEventListener("error", reject, { once: true });
        video.src = src;
        video.load();
      });

      return video._loadPromise;
    };

    const syncVideoState = async (video, visible) => {
      if (!video) return;
      if (visible) {
        await loadVideo(video);
        try {
          await video.play();
        } catch (_) { }
      } else {
        video.pause();
        video.currentTime = 0;
      }
    };

    const syncClipState = () =>
      Promise.all(videos.map((video, i) => syncVideoState(video, targetVisible[i])));

    const formatScreenPoint = (point) =>
      point ? `${Math.round(point.x)}/${Math.round(point.y)}` : "unknown";

    let layoutSettlingUntil = 0;

    const markLayoutChange = () => {
      layoutSettlingUntil = performance.now() + 300;
      if (typeof scene.resize === "function") {
        scene.resize();
      }
    };

    window.addEventListener("resize", markLayoutChange);
    window.addEventListener("orientationchange", markLayoutChange);
    window.visualViewport?.addEventListener("resize", markLayoutChange);

    const isLayoutSettling = () => performance.now() < layoutSettlingUntil;

    const syncCameraProjection = (camera, renderer) => {
      const size = new AFRAME.THREE.Vector2();
      renderer.getSize(size);
      if (size.x < 1 || size.y < 1) {
        return false;
      }

      const aspect = size.x / size.y;
      if (Math.abs(camera.aspect - aspect) > 0.001) {
        camera.aspect = aspect;
        camera.updateProjectionMatrix();
      }

      return true;
    };

    const isScreenPointVisible = (point) => {
      const margin = 32;
      const viewport = window.visualViewport;
      const left = viewport?.offsetLeft ?? 0;
      const top = viewport?.offsetTop ?? 0;
      const width = viewport?.width ?? window.innerWidth;
      const height = viewport?.height ?? window.innerHeight;

      return (
        point.x >= left - margin &&
        point.x <= left + width + margin &&
        point.y >= top - margin &&
        point.y <= top + height + margin
      );
    };

    const projectWorldPointToScreen = (worldPoint) => {
      const camera = scene.camera;
      const renderer = scene.renderer;

      if (!camera || !renderer || !worldPoint || isLayoutSettling()) {
        return null;
      }

      if (!syncCameraProjection(camera, renderer)) {
        return null;
      }

      scene.object3D.updateMatrixWorld(true);
      camera.updateMatrixWorld(true);

      const cameraSpace = worldPoint.clone().applyMatrix4(camera.matrixWorldInverse);
      if (cameraSpace.z >= 0) {
        return null;
      }

      const projected = worldPoint.clone().project(camera);
      if (!Number.isFinite(projected.x) || !Number.isFinite(projected.y)) {
        return null;
      }

      if (Math.abs(projected.x) > 1.05 || Math.abs(projected.y) > 1.05) {
        return null;
      }

      const rect = renderer.domElement.getBoundingClientRect();
      if (rect.width < 1 || rect.height < 1) {
        return null;
      }

      const screenPoint = {
        x: rect.left + ((projected.x + 1) / 2) * rect.width,
        y: rect.top + ((1 - projected.y) / 2) * rect.height,
      };

      return isScreenPointVisible(screenPoint) ? screenPoint : null;
    };

    const projectEntityCornerToScreen = (entity, localPoint) => {
      const Vector3 = AFRAME.THREE.Vector3;

      if (!entity?.object3D) {
        return null;
      }

      const root = entity.getObject3D("mesh") || entity.object3D;
      root.updateWorldMatrix(true, false);

      const worldPoint = new Vector3().copy(localPoint);
      root.localToWorld(worldPoint);

      return projectWorldPointToScreen(worldPoint);
    };

    const upperLeftFromSize = (width, height) =>
      new AFRAME.THREE.Vector3(-width / 2, height / 2, 0);

    const getMarkerLocalSize = (target) => {
      const comp = target.components["mindar-image-target"];
      if (!comp?.postMatrix) return null;

      const position = new AFRAME.THREE.Vector3();
      const scale = new AFRAME.THREE.Vector3();
      const quaternion = new AFRAME.THREE.Quaternion();
      comp.postMatrix.decompose(position, quaternion, scale);

      const markerWidth = scale.x;
      if (!markerWidth || !Number.isFinite(markerWidth)) return null;

      const markerHeight = (2 * position.y) / markerWidth;
      if (!Number.isFinite(markerHeight) || markerHeight <= 0) return null;

      return {
        width: 1,
        height: markerHeight,
      };
    };

    const getCornerDebugText = (target) => {
      const videoEntity = target.querySelector("a-video");
      const markerSize = getMarkerLocalSize(target);

      if (!videoEntity) {
        return "target UpperLeft corner is unknown\nvideo UpperLeft corner is unknown";
      }

      const videoWidth = Number(videoEntity.getAttribute("width")) || 1;
      const videoHeight = Number(videoEntity.getAttribute("height")) || 0.65;

      const targetUpperLeft = markerSize
        ? projectEntityCornerToScreen(
            target,
            upperLeftFromSize(markerSize.width, markerSize.height)
          )
        : null;
      const videoUpperLeft = projectEntityCornerToScreen(
        videoEntity,
        upperLeftFromSize(videoWidth, videoHeight)
      );

      return [
        `target UpperLeft corner is ${formatScreenPoint(targetUpperLeft)}`,
        `video UpperLeft corner is ${formatScreenPoint(videoUpperLeft)}`,
      ].join("\n");
    };

    let debugTargetIndex = null;

    const updateDebugStatus = () => {
      if (debugTargetIndex === null) return;

      const target = targets[debugTargetIndex];
      if (!target || !targetVisible[debugTargetIndex]) return;

      statusText.textContent = [
        `target${debugTargetIndex} found, playing video ${videoIdForTarget(debugTargetIndex)}`,
        getCornerDebugText(target),
      ].join("\n");
    };

    const bindDebugRenderLoop = () => {
      scene.addEventListener("renderend", updateDebugStatus);
    };

    if (scene.hasLoaded) {
      bindDebugRenderLoop();
    } else {
      scene.addEventListener("loaded", bindDebugRenderLoop, { once: true });
    }

    const fullscreenBtn = document.getElementById("fullscreenBtn");

    const isFullscreen = () =>
      !!(document.fullscreenElement || document.webkitFullscreenElement);

    const requestPageFullscreen = () => {
      const el = document.documentElement;
      const request =
        el.requestFullscreen ||
        el.webkitRequestFullscreen ||
        document.body.requestFullscreen ||
        document.body.webkitRequestFullscreen;

      if (!request) return Promise.reject(new Error("fullscreen not supported"));

      return Promise.resolve(request.call(el)).catch(() =>
        Promise.resolve(request.call(document.body))
      );
    };

    const exitPageFullscreen = () => {
      const exit =
        document.exitFullscreen ||
        document.webkitExitFullscreen;

      if (!exit) return Promise.reject(new Error("fullscreen not supported"));

      return Promise.resolve(exit.call(document));
    };

    const updateFullscreenButton = () => {
      const supported =
        document.fullscreenEnabled !== false &&
        !!(
          document.documentElement.requestFullscreen ||
          document.documentElement.webkitRequestFullscreen ||
          document.body.requestFullscreen ||
          document.body.webkitRequestFullscreen
        );

      fullscreenBtn.textContent = isFullscreen()
        ? "Exit fullscreen"
        : "Enter fullscreen";
      fullscreenBtn.disabled = !supported;
    };

    fullscreenBtn.addEventListener("click", () => {
      const action = isFullscreen()
        ? exitPageFullscreen()
        : requestPageFullscreen();

      action.catch(() => {
        updateFullscreenButton();
      });
    });

    document.addEventListener("fullscreenchange", updateFullscreenButton);
    document.addEventListener("webkitfullscreenchange", updateFullscreenButton);
    updateFullscreenButton();

    targets.forEach((target, i) => {
      if (!target) return;

      target.addEventListener("targetFound", () => {
        targetVisible[i] = true;
        debugTargetIndex = i;
        statusText.textContent = `target${i} found, loading video...`;
        syncClipState().then(() => {
          updateDebugStatus();
        }).catch(() => {
          statusText.textContent = `target${i} found, video failed to load`;
        });
      });

      target.addEventListener("targetLost", () => {
        targetVisible[i] = false;
        if (debugTargetIndex === i) {
          debugTargetIndex = null;
        }
        syncClipState();
        statusText.textContent = `target${i} lost, waiting for targets`;
      });
    });
  </script>
</body>

</html>
