  <title>Plamen AR Poster</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MindAR (image tracking) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  a-scene {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
  }

  .mindar-ui-scanning .scanning {
    width: 85vw !important;
    height: 85vh !important;
  }

  /* @media (orientation: portrait) {
    .mindar-ui-scanning .scanning {
      width: 85vw !important;
      height: 85vw !important;
    }
  }

  @media (orientation: landscape) {
    .mindar-ui-scanning .scanning {
      width: 85vh !important;
      height: 85vh !important;
    }
  } */
</style>

    waiting for targets
  </div>
  <!-- maximum 1 target at a time ! -->

    <a-entity id="target19" mindar-image-target="targetIndex: 19">

    </a-entity>

    <a-entity id="target20" mindar-image-target="targetIndex: 20">
      <a-video src="#vid121" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target21" mindar-image-target="targetIndex: 21">
      <a-video src="#vid122" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-entity id="target22" mindar-image-target="targetIndex: 22">
      <a-video src="#vid123" position="0 0 0" width="1" height="0.65" rotation="0 0 0"></a-video>
    </a-entity>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  </a-scene>

  <script>
    const TARGET_COUNT = 23;
    const statusText = document.getElementById("statusText");
    const scene = document.querySelector("a-scene");

    const videoIdForTarget = (index) =>
      index === 0 ? "vid1" : `vid1${index + 1}`;

    const targets = Array.from({ length: TARGET_COUNT }, (_, i) =>
      document.getElementById(`target${i}`)
    );

    const videos = targets.map((_, i) =>
      document.getElementById(videoIdForTarget(i))
    );

    const targetVisible = Array(TARGET_COUNT).fill(false);
    let debugTargetIndex = null;

    const loadVideo = (video) => {
      if (!video || video.dataset.loaded === "true") {
        return Promise.resolve();
      }
      if (video._loadPromise) return video._loadPromise;

      const src = video.dataset.src;
      if (!src) return Promise.resolve();

      video._loadPromise = new Promise((resolve, reject) => {
        video.addEventListener("loadeddata", () => {
          video.dataset.loaded = "true";
          resolve();
        }, { once: true });
        video.addEventListener("error", reject, { once: true });
        video.src = src;
        video.load();
      });

      return video._loadPromise;
    };

    const setTargetVideoVisible = (targetIndex, visible) => {
      const videoEntity = targets[targetIndex]?.querySelector("a-video");
      if (videoEntity) {
        videoEntity.setAttribute("visible", visible);
      }
    };

    const syncVideoState = async (video, visible, targetIndex) => {
      if (!video) return;
      if (targetIndex !== undefined) {
        setTargetVideoVisible(targetIndex, visible);
      }
      if (visible) {
        await loadVideo(video);
        try {
          await video.play();
        } catch (_) { }
      } else {
        video.pause();
        video.currentTime = 0;
      }
    };

    const syncClipState = () =>
      Promise.all(videos.map((video, i) => syncVideoState(video, targetVisible[i], i)));

    const formatScreenPoint = (point) =>
      point ? `${Math.round(point.x)}/${Math.round(point.y)}` : "unknown point";

    const ORIENTATION_RESTART_DELAY_MS = 800;
    const LAYOUT_SETTLE_MS = 300;
    const LAYOUT_SYNC_DELAYS_MS = [0, 100, 300, 600];
    let layoutSettlingUntil = 0;
    let orientationRestartTimer = null;
    let layoutSyncTimers = [];
    let isRestartingAR = false;
    let pendingRestartLayoutSync = false;

    const isLayoutSettling = () => performance.now() < layoutSettlingUntil;

    const markLayoutSettling = (extraMs = LAYOUT_SETTLE_MS) => {
      layoutSettlingUntil = performance.now() + extraMs;
    };

    const clearLayoutSettling = () => {
      layoutSettlingUntil = 0;
    };

    const getMindARSystem = () => scene.systems?.["mindar-image-system"];

    const getSceneCamera = () => {
      const cameraEl = scene.querySelector("a-camera");
      return cameraEl?.getObject3D("camera") || scene.camera;
    };

    const syncARLayout = () => {
      const arSystem = getMindARSystem();
      if (!arSystem?.video || !arSystem?.controller) {
        return;
      }

      if (typeof scene.resize === "function") {
        scene.resize();
      }
      if (typeof arSystem._resize === "function") {
        arSystem._resize();
      }
    };

    const clearScheduledLayoutSync = () => {
      layoutSyncTimers.forEach(clearTimeout);
      layoutSyncTimers = [];
    };

    const scheduleSyncARLayout = () => {
      clearScheduledLayoutSync();
      LAYOUT_SYNC_DELAYS_MS.forEach((delayMs) => {
        layoutSyncTimers.push(setTimeout(syncARLayout, delayMs));
      });
      requestAnimationFrame(syncARLayout);
    };

    const onARReady = () => {
      isRestartingAR = false;
      scheduleSyncARLayout();
      markLayoutSettling(LAYOUT_SETTLE_MS);

      if (pendingRestartLayoutSync) {
        pendingRestartLayoutSync = false;
        statusText.textContent = "waiting for targets";
      }
    };

    scene.addEventListener("arReady", onARReady);

    const onLayoutChange = () => {
      if (isRestartingAR) {
        return;
      }

      markLayoutSettling();
      syncARLayout();
    };

    window.addEventListener("resize", onLayoutChange);
    window.visualViewport?.addEventListener("resize", onLayoutChange);

    const resetTrackingState = () => {
      targetVisible.fill(false);
      debugTargetIndex = null;
      syncClipState();
    };

    const restartMindARAfterOrientation = () => {
      isRestartingAR = true;
      pendingRestartLayoutSync = true;
      markLayoutSettling(ORIENTATION_RESTART_DELAY_MS + LAYOUT_SETTLE_MS);
      resetTrackingState();
      statusText.textContent = "restarting AR after rotation...";

      if (orientationRestartTimer !== null) {
        clearTimeout(orientationRestartTimer);
      }

      orientationRestartTimer = setTimeout(() => {
        orientationRestartTimer = null;
        const arSystem = getMindARSystem();
        if (!arSystem?.video) {
          isRestartingAR = false;
          pendingRestartLayoutSync = false;
          statusText.textContent = "waiting for targets";
          return;
        }

        try {
          arSystem.stop();
        } catch (_) { }

        setTimeout(() => {
          try {
            arSystem.start();
          } catch (_) {
            isRestartingAR = false;
            pendingRestartLayoutSync = false;
            statusText.textContent = "AR restart failed — reload the page";
          }
        }, 100);
      }, ORIENTATION_RESTART_DELAY_MS);
    };

    window.addEventListener("orientationchange", restartMindARAfterOrientation);

    const isScreenPointVisible = (point, rect) => {
      const margin = 32;

      return (
        point.x >= rect.left - margin &&
        point.x <= rect.right + margin &&
        point.y >= rect.top - margin &&
        point.y <= rect.bottom + margin
      );
    };

    const projectWorldPointToScreen = (worldPoint) => {
      const camera = getSceneCamera();
      const renderer = scene.renderer;

      if (!camera || !renderer || !worldPoint || isLayoutSettling()) {
        return null;
      }

      scene.object3D.updateMatrixWorld(true);
      camera.updateMatrixWorld(true);

      const cameraSpace = worldPoint.clone().applyMatrix4(camera.matrixWorldInverse);
      if (cameraSpace.z >= 0) {
        return null;
      }

      const projected = worldPoint.clone().project(camera);
      if (!Number.isFinite(projected.x) || !Number.isFinite(projected.y)) {
        return null;
      }

      if (Math.abs(projected.x) > 1.05 || Math.abs(projected.y) > 1.05) {
        return null;
      }

      const rect = renderer.domElement.getBoundingClientRect();
      if (rect.width < 1 || rect.height < 1) {
        return null;
      }

      const screenPoint = {
        x: rect.left + ((projected.x + 1) / 2) * rect.width,
        y: rect.top + ((1 - projected.y) / 2) * rect.height,
      };

      return isScreenPointVisible(screenPoint, rect) ? screenPoint : null;
    };

    const projectEntityCornerToScreen = (entity, localPoint) => {
      const Vector3 = AFRAME.THREE.Vector3;

      if (!entity?.object3D) {
        return null;
      }

      const root = entity.getObject3D("mesh") || entity.object3D;
      root.updateWorldMatrix(true, false);

      const worldPoint = new Vector3().copy(localPoint);
      root.localToWorld(worldPoint);

      return projectWorldPointToScreen(worldPoint);
    };

    const upperLeftFromSize = (width, height) =>
      new AFRAME.THREE.Vector3(-width / 2, height / 2, 0);

    const getMarkerLocalSize = (target) => {
      const comp = target.components["mindar-image-target"];
      if (!comp?.postMatrix) return null;

      const position = new AFRAME.THREE.Vector3();
      const scale = new AFRAME.THREE.Vector3();
      const quaternion = new AFRAME.THREE.Quaternion();
      comp.postMatrix.decompose(position, quaternion, scale);

      const markerWidth = scale.x;
      if (!markerWidth || !Number.isFinite(markerWidth)) return null;

      const markerHeight = (2 * position.y) / markerWidth;
      if (!Number.isFinite(markerHeight) || markerHeight <= 0) return null;

      return {
        width: 1,
        height: markerHeight,
      };
    };

    const getCornerDebugText = (target) => {
      const videoEntity = target.querySelector("a-video");
      const markerSize = getMarkerLocalSize(target);

      if (!videoEntity) {
        return "!videoEntity, so target UpperLeft corner is unknown\n!videoEntity, so video UpperLeft corner is unknown";
      }

      const videoWidth = Number(videoEntity.getAttribute("width")) || 1;
      const videoHeight = Number(videoEntity.getAttribute("height")) || 0.65;

      const targetUpperLeft = markerSize
        ? projectEntityCornerToScreen(
          target,
          upperLeftFromSize(markerSize.width, markerSize.height)
        )
        : null;
      const videoUpperLeft = projectEntityCornerToScreen(
        videoEntity,
        upperLeftFromSize(videoWidth, videoHeight)
      );

      return [
        `target UpperLeft corner is ${formatScreenPoint(targetUpperLeft)}`,
        `video UpperLeft corner is ${formatScreenPoint(videoUpperLeft)}`,
      ].join("\n");
    };

    const updateDebugStatus = () => {
      if (debugTargetIndex === null) return;

      const target = targets[debugTargetIndex];
      if (!target || !targetVisible[debugTargetIndex]) return;

      statusText.textContent = [
        `target${debugTargetIndex} found, playing video ${videoIdForTarget(debugTargetIndex)}`,
        getCornerDebugText(target),
      ].join("\n");
    };

    const bindDebugRenderLoop = () => {
      scene.addEventListener("renderend", updateDebugStatus);
    };

    if (scene.hasLoaded) {
      bindDebugRenderLoop();
    } else {
      scene.addEventListener("loaded", bindDebugRenderLoop, { once: true });
    }

    targets.forEach((target, i) => {
      if (!target) return;

      target.addEventListener("targetFound", () => {
        targetVisible[i] = true;
        debugTargetIndex = i;
        syncARLayout();
        clearLayoutSettling();
        statusText.textContent = `target${i} found, loading video...`;
        syncClipState().then(() => {
          syncARLayout();
          updateDebugStatus();
        }).catch(() => {
          statusText.textContent = `target${i} found, video failed to load`;
        });
      });

      target.addEventListener("targetLost", () => {
        targetVisible[i] = false;
        if (debugTargetIndex === i) {
          debugTargetIndex = null;
        }
        syncClipState();
        statusText.textContent = `target${i} lost, waiting for targets`;
      });
    });
  </script>
</body>

</html>
